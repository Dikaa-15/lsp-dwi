<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — AutoPart Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              red: '#EF4444',
              'red-hover': '#DC2626',
              'red-light': '#FEF2F2',
              'red-focus': 'rgba(239,68,68,0.12)',
              dark: '#1E293B',
            }
          },
          boxShadow: {
            'input': '0 0 0 1px #E2E8F0',
            'input-focus': '0 0 0 2px rgba(239,68,68,0.25)',
            'card': '0 1px 3px rgba(0,0,0,0.03), 0 1px 2px rgba(0,0,0,0.02)',
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { font-feature-settings: "cv11", "ss01"; }

    /* Input focus ring */
    .input-field {
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .input-field:focus-within {
      box-shadow: 0 0 0 2px rgba(239,68,68,0.25);
      border-color: #EF4444;
    }

    /* Button loading */
    .btn-loading {
      pointer-events: none;
      opacity: 0.85;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 0.7s linear infinite;
    }

    /* Toast */
    .toast-enter {
      animation: toastSlide 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .toast-exit {
      animation: toastFade 0.25s ease forwards;
    }
    @keyframes toastSlide {
      from { opacity: 0; transform: translateY(-12px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastFade {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-8px) scale(0.97); }
    }

    /* Error state */
    .input-error {
      border-color: #EF4444 !important;
      box-shadow: 0 0 0 2px rgba(239,68,68,0.15) !important;
    }
    .error-text {
      animation: errorIn 0.2s ease forwards;
    }
    @keyframes errorIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Subtle image desaturation */
    .login-image {
      filter: saturate(0.25) brightness(0.92);
      transition: filter 0.6s ease;
    }
    .login-image:hover {
      filter: saturate(0.4) brightness(0.95);
    }

    /* Password toggle */
    .pw-toggle {
      transition: color 0.15s ease;
    }
    .pw-toggle:hover {
      color: #64748B;
    }

    /* Checkbox custom */
    .custom-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid #CBD5E1;
      border-radius: 4px;
      background: #FFFFFF;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      flex-shrink: 0;
    }
    .custom-checkbox:checked {
      background: #EF4444;
      border-color: #EF4444;
    }
    .custom-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 4.5px;
      top: 1.5px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }
    .custom-checkbox:focus-visible {
      box-shadow: 0 0 0 2px rgba(239,68,68,0.25);
    }
    .custom-checkbox:hover {
      border-color: #94A3B8;
    }

    /* Link underline animation */
    .link-anim {
      position: relative;
    }
    .link-anim::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 0;
      height: 1px;
      background: #EF4444;
      transition: width 0.25s ease;
    }
    .link-anim:hover::after {
      width: 100%;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 3px; }
  </style>
</head>
<body class="bg-white font-sans text-brand-dark min-h-screen">

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-2"></div>

  <!-- Main Layout: Split Screen -->
  <div class="min-h-screen flex">

    <!-- ====== LEFT: Image Panel (hidden on mobile) ====== -->
    <div class="hidden lg:flex lg:w-[45%] xl:w-[48%] bg-slate-50 relative overflow-hidden">
      <img
        src="https://picsum.photos/seed/garage-engine-aesthetic/1200/1600.jpg"
        alt="Modern car engine in aesthetic garage"
        class="login-image absolute inset-0 w-full h-full object-cover"
      >
    </div>

    <!-- ====== RIGHT: Login Form ====== -->
    <div class="flex-1 flex items-center justify-center px-4 sm:px-6 lg:px-10 xl:px-16 py-8">
      <div class="w-full max-w-[400px]">

        <!-- Mobile-only logo -->
        <div class="flex lg:hidden items-center gap-2 mb-10">
          <div class="w-8 h-8 bg-brand-red rounded-md flex items-center justify-center">
            <i data-lucide="cog" class="w-4 h-4 text-white"></i>
          </div>
          <span class="text-lg font-semibold text-brand-dark tracking-tight">AutoPart<span class="text-brand-red">Center</span></span>
        </div>

        <!-- Header -->
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-brand-dark tracking-tight leading-tight">
            Selamat Datang Kembali
          </h1>
          <p class="mt-2 text-sm text-slate-500 leading-relaxed">
            Masuk ke akun Anda untuk melanjutkan belanja suku cadang.
          </p>
        </div>

        <!-- Login Form -->
        <form id="login-form" novalidate onsubmit="handleLogin(event)" class="space-y-5">

          <!-- Email Field -->
          <div>
            <label for="email" class="block text-sm font-medium text-brand-dark mb-1.5">Email</label>
            <div class="input-field flex items-center border border-slate-200 rounded-md bg-white h-11 px-3" id="email-wrapper">
              <i data-lucide="user" class="w-4 h-4 text-slate-400 shrink-0"></i>
              <input
                id="email"
                type="email"
                placeholder="nama@email.com"
                autocomplete="email"
                class="flex-1 bg-transparent text-[16px] text-brand-dark placeholder-slate-400 ml-3 outline-none"
                aria-describedby="email-error"
              >
            </div>
            <p id="email-error" class="error-text hidden text-xs text-brand-red mt-1.5 flex items-center gap-1" role="alert">
              <i data-lucide="alert-circle" class="w-3 h-3 shrink-0"></i>
              <span></span>
            </p>
          </div>

          <!-- Password Field -->
          <div>
            <label for="password" class="block text-sm font-medium text-brand-dark mb-1.5">Password</label>
            <div class="input-field flex items-center border border-slate-200 rounded-md bg-white h-11 px-3" id="password-wrapper">
              <i data-lucide="lock" class="w-4 h-4 text-slate-400 shrink-0"></i>
              <input
                id="password"
                type="password"
                placeholder="Masukkan password"
                autocomplete="current-password"
                class="flex-1 bg-transparent text-[16px] text-brand-dark placeholder-slate-400 ml-3 outline-none"
                aria-describedby="password-error"
              >
              <button type="button" onclick="togglePassword()" class="pw-toggle text-slate-400 ml-2 p-0.5" aria-label="Tampilkan password">
                <i data-lucide="eye" class="w-4 h-4" id="eye-icon"></i>
              </button>
            </div>
            <p id="password-error" class="error-text hidden text-xs text-brand-red mt-1.5 flex items-center gap-1" role="alert">
              <i data-lucide="alert-circle" class="w-3 h-3 shrink-0"></i>
              <span></span>
            </p>
          </div>

          <!-- Remember Me & Forgot Password -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer select-none">
              <input type="checkbox" class="custom-checkbox" id="remember">
              <span class="text-sm text-slate-500">Ingat saya</span>
            </label>
            <a href="#" class="link-anim text-sm font-medium text-brand-red hover:text-brand-red-hover transition-colors">
              Lupa Password?
            </a>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            id="submit-btn"
            class="w-full h-11 flex items-center justify-center bg-brand-red hover:bg-brand-red-hover text-white text-sm font-semibold rounded-md transition-colors duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-brand-red"
          >
            <span id="btn-text">Masuk</span>
            <svg id="btn-spinner" class="spinner hidden w-4 h-4 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </button>
        </form>


        <!-- Register Link -->
        <p class="text-center text-sm text-slate-500 mt-8">
          Belum punya akun?
          <a href="#" class="link-anim font-semibold text-brand-red hover:text-brand-red-hover transition-colors ml-0.5">
            Daftar sekarang
          </a>
        </p>

        <!-- Back to home (mobile) -->
        <div class="flex lg:hidden justify-center mt-6">
          <a href="#" class="inline-flex items-center gap-1.5 text-xs text-slate-400 hover:text-slate-600 transition-colors">
            <i data-lucide="arrow-left" class="w-3 h-3"></i>
            Kembali ke beranda
          </a>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ---- Init Icons ----
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });

    // ---- Toggle Password Visibility ----
    let pwVisible = false;
    function togglePassword() {
      pwVisible = !pwVisible;
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      input.type = pwVisible ? 'text' : 'password';
      icon.setAttribute('data-lucide', pwVisible ? 'eye-off' : 'eye');
      lucide.createIcons();
    }

    // ---- Clear Field Error ----
    function clearError(fieldId) {
      const wrapper = document.getElementById(fieldId + '-wrapper');
      const errorEl = document.getElementById(fieldId + '-error');
      wrapper.classList.remove('input-error');
      errorEl.classList.add('hidden');
    }

    // ---- Set Field Error ----
    function setError(fieldId, message) {
      const wrapper = document.getElementById(fieldId + '-wrapper');
      const errorEl = document.getElementById(fieldId + '-error');
      wrapper.classList.add('input-error');
      errorEl.classList.remove('hidden');
      errorEl.querySelector('span').textContent = message;
      lucide.createIcons();
    }

    // ---- Real-time input clearing ----
    document.getElementById('email').addEventListener('input', () => clearError('email'));
    document.getElementById('password').addEventListener('input', () => clearError('password'));

    // ---- Handle Login ----
    function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      // Validate email
      if (!email) {
        setError('email', 'Email wajib diisi');
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setError('email', 'Format email tidak valid');
        valid = false;
      }

      // Validate password
      if (!password) {
        setError('password', 'Password wajib diisi');
        valid = false;
      } else if (password.length < 6) {
        setError('password', 'Password minimal 6 karakter');
        valid = false;
      }

      if (!valid) return;

      // Show loading
      const btn = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');
      btn.classList.add('btn-loading');
      btnText.textContent = 'Memproses...';
      btnSpinner.classList.remove('hidden');

      // Simulate API call
      setTimeout(() => {
        btn.classList.remove('btn-loading');
        btnText.textContent = 'Masuk';
        btnSpinner.classList.add('hidden');

        // Demo: hardcoded success for demo@example.com
        if (email === 'demo@example.com' && password === 'demo123') {
          showToast('Login berhasil! Mengalihkan...', 'success');
        } else {
          showToast('Email atau password salah. Coba: demo@example.com / demo123', 'error');
        }
      }, 1500);
    }

    // ---- Toast System ----
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');

      let bg, icon, borderColor;
      switch (type) {
        case 'success':
          bg = 'bg-green-50 border-green-200';
          icon = 'check-circle';
          borderColor = 'border-l-4 border-l-green-500';
          break;
        case 'error':
          bg = 'bg-red-50 border-red-200';
          icon = 'x-circle';
          borderColor = 'border-l-4 border-l-red-500';
          break;
        default:
          bg = 'bg-slate-50 border-slate-200';
          icon = 'info';
          borderColor = 'border-l-4 border-l-slate-400';
      }

      const iconColor = type === 'success' ? 'text-green-500' : type === 'error' ? 'text-red-500' : 'text-slate-500';
      const textColor = type === 'success' ? 'text-green-800' : type === 'error' ? 'text-red-800' : 'text-slate-700';

      toast.className = `toast-enter flex items-start gap-3 px-4 py-3 rounded-md border shadow-sm max-w-sm w-full ${bg} ${borderColor}`;
      toast.innerHTML = `
        <i data-lucide="${icon}" class="w-4 h-4 ${iconColor} shrink-0 mt-0.5"></i>
        <span class="text-sm ${textColor} leading-snug">${message}</span>
      `;

      container.appendChild(toast);
      lucide.createIcons();

      setTimeout(() => {
        toast.classList.remove('toast-enter');
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 250);
      }, 4000);
    }
  </script>
</body>
</html>
