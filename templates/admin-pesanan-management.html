    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    .nav-link { transition: all 0.15s ease; }
    .nav-link:hover { background: rgba(255,255,255,0.06); color: #F1F5F9; }
    .nav-link.active { background: rgba(239,68,68,0.12); color: #F87171; }
    .nav-link.active .nav-icon { color: #F87171; }

    .tbl-row { transition: background-color 0.1s ease; }
    .tbl-row:hover { background: #F8FAFC; }
    .tbl-row.row-active { background: #FEF2F2; border-left: 3px solid #EF4444; }

    /* Status badges */
    .badge-menunggu { background: #FEF2F2; color: #DC2626; }
    .badge-diproses { background: #EFF6FF; color: #2563EB; }
    .badge-dikirim { background: #F0FDF4; color: #16A34A; }
    .badge-selesai { background: #DCFCE7; color: #15803D; }
    .badge-dibatalkan { background: #FEF2F2; color: #991B1B; }

    /* Pulse for pending */
    .pulse-dot { position: relative; }
    .pulse-dot::before {
      content: ''; position: absolute; inset: -2px; border-radius: 50%;
      background: #EF4444; opacity: 0.4;
      animation: pulseDot 2s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.8); opacity: 0; }
    }

    /* Detail panel */
    .detail-panel { transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.16,1,0.3,1); }
    .detail-hidden { opacity: 0; transform: translateX(16px); pointer-events: none; }
    .detail-visible { opacity: 1; transform: translateX(0); pointer-events: auto; }

    /* Image zoom */
    .proof-img { cursor: zoom-in; transition: transform 0.3s ease; }
    .proof-img:hover { transform: scale(1.03); }

    /* Lightbox */
    .lightbox { transition: opacity 0.2s ease; }
    .lightbox-img { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }

    /* Toast */
    .toast-enter { animation: toastSlide 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
    .toast-exit { animation: toastFade 0.25s ease forwards; }
    @keyframes toastSlide { from { opacity:0; transform:translateX(16px) scale(0.97); } to { opacity:1; transform:translateX(0) scale(1); } }
    @keyframes toastFade { from { opacity:1; } to { opacity:0; transform:translateX(8px) scale(0.97); } }

    /* Action button */
    .act-btn { transition: all 0.15s ease; }

    /* Sidebar */
    .sidebar-overlay { transition: opacity 0.25s ease; }
    .sidebar-panel { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }

    /* Select */
    .form-select { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
    .form-select:focus { border-color: #EF4444; box-shadow: 0 0 0 2px rgba(239,68,68,0.12); outline: none; }

    .input-field { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
    .input-field:focus { border-color: #EF4444; box-shadow: 0 0 0 2px rgba(239,68,68,0.12); outline: none; }

    /* Row exit */
    .row-exit { animation: rowSlide 0.3s ease forwards; }
    @keyframes rowSlide { to { opacity: 0; height: 0; padding: 0; overflow: hidden; } }

    /* Tab count animation */
    .tab-count { font-variant-numeric: tabular-nums; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 3px; }
    .dark-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

    ];

    let statusFilter = 'all';
    let activeOrderId = null;

    // ==================== HELPERS ====================
    function fmt(n) { return 'Rp' + n.toLocaleString('id-ID'); }
    function fmtDate(ts) { return new Date(ts).toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'}); }
    function fmtTime(ts) { return new Date(ts).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'}); }

    const statusMap = {
      menunggu_verifikasi: { label: 'Menunggu', cls: 'badge-menunggu', pulse: true },
      diproses: { label: 'Diproses', cls: 'badge-diproses', pulse: false },
      dikirim: { label: 'Dikirim', cls: 'badge-dikirim', pulse: false },
      selesai: { label: 'Selesai', cls: 'badge-selesai', pulse: false },
      dibatalkan: { label: 'Dibatalkan', cls: 'badge-dibatalkan', pulse: false },
    };

    function statusBadge(status) {
      const s = statusMap[status] || statusMap.menunggu_verifikasi;
      const dot = s.pulse ? `<span class="w-1.5 h-1.5 bg-brand-red rounded-full pulse-dot mr-1.5"></span>` : '';
      return `<span class="inline-flex items-center px-2 py-0.5 ${s.cls} text-[10px] font-semibold rounded-md">${dot}${s.label}</span>`;
    }

    // ==================== COUNT TABS ====================
    function updateCounts() {
      const counts = {};
      orders.forEach(o => { counts[o.status] = (counts[o.status] || 0) + 1; });
      document.getElementById('tab-menunggu').textContent = counts.menunggu_verifikasi || 0;
      document.getElementById('tab-diproses').textContent = counts.diproses || 0;
      document.getElementById('tab-dikirim').textContent = counts.dikirim || 0;
      document.getElementById('tab-selesai').textContent = counts.selesai || 0;

      const pending = counts.menunggu_verifikasi || 0;
      document.getElementById('sidebar-badge').textContent = pending;
      document.getElementById('header-badge').textContent = pending + ' menunggu';
    }

    // ==================== RENDER ORDERS ====================
    function renderOrders() {
      const search = document.getElementById('search-input').value.toLowerCase().trim();
      let filtered = orders.filter(o => {
        const matchSearch = !search || o.id.toLowerCase().includes(search) || o.customer.toLowerCase().includes(search);
        const matchStatus = statusFilter === 'all' || o.status === statusFilter;
        return matchSearch && matchStatus;
      });

      const tbody = document.getElementById('orders-tbody');
      const empty = document.getElementById('table-empty');

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        document.getElementById('showing-text').textContent = '';
        lucide.createIcons();
        return;
      }

      empty.classList.add('hidden');
      document.getElementById('showing-text').textContent = 'Menampilkan ' + filtered.length + ' dari ' + orders.length + ' pesanan';

      tbody.innerHTML = filtered.map(o => `
        <tr class="tbl-row border-b border-slate-50 last:border-0 cursor-pointer ${activeOrderId === o.id ? 'row-active' : ''}" onclick="openDetail('${o.id}')">
          <td class="px-4 py-3">
            <p class="text-[13px] font-mono font-semibold text-brand-dark">${o.id}</p>
            <p class="text-[10px] text-slate-400 sm:hidden">${fmtDate(o.tanggal)}</p>
          </td>
          <td class="px-4 py-3">
            <p class="text-[13px] font-medium text-brand-dark">${o.customer}</p>
            <p class="text-[10px] text-slate-400">${o.wa}</p>
          </td>
          <td class="px-4 py-3 text-[12px] text-slate-500 hidden sm:table-cell">
            <p>${fmtDate(o.tanggal)}</p>
            <p class="text-[10px] text-slate-400">${fmtTime(o.tanggal)}</p>
          </td>
          <td class="px-4 py-3 text-right">
            <p class="text-[13px] font-semibold text-brand-dark tabular-nums">${fmt(o.total)}</p>
          </td>
          <td class="px-4 py-3">${statusBadge(o.status)}</td>
          <td class="px-4 py-3 text-right">
            <button onclick="event.stopPropagation(); openDetail('${o.id}')" class="act-btn inline-flex items-center gap-1 px-2.5 py-1.5 text-[10px] font-medium text-slate-500 rounded-md hover:bg-slate-100">
              <i data-lucide="eye" class="w-3 h-3"></i>
              Periksa
            </button>
          </td>
        </tr>
      `).join('');

      updateCounts();
      lucide.createIcons();
    }

    // ==================== FILTER ====================
    function filterStatus(status) {
      statusFilter = status;
      document.querySelectorAll('.status-tab').forEach(tab => {
        tab.classList.remove('active', 'bg-slate-900', 'text-white');
        tab.classList.add('bg-white', 'text-slate-500', 'border', 'border-slate-200');
        if (tab.dataset.st === status) {
          tab.classList.add('active', 'bg-slate-900', 'text-white');
          tab.classList.remove('bg-white', 'text-slate-500', 'border', 'border-slate-200');
        }
      });
      renderOrders();
    }

    // ==================== DETAIL PANEL ====================
    function openDetail(id) {
      activeOrderId = id;
      const o = orders.find(x => x.id === id);
      if (!o) return;

      renderOrders(); // Update active row highlight

      document.getElementById('detail-status-badge').innerHTML = statusBadge(o.status);

      const itemsHtml = o.items.map(i => `
        <div class="flex items-center justify-between py-2.5 border-b border-slate-50 last:border-0">
          <div class="flex-1 min-w-0 mr-4">
            <p class="text-[13px] font-medium text-brand-dark truncate">${i.nama}</p>
            <p class="text-[11px] text-slate-400">${i.qty} × ${fmt(i.harga)}</p>
          </div>
          <p class="text-[13px] font-semibold text-brand-dark tabular-nums shrink-0">${fmt(i.qty * i.harga)}</p>
        </div>
      `).join('');

      const isPending = o.status === 'menunggu_verifikasi';
      const isProcessed = o.status === 'diproses';
      const isShipped = o.status === 'dikirim';
      const canAct = isPending || isProcessed || isShipped;

      let actionsHtml = '';

      if (isPending) {
        actionsHtml = `
          <div class="grid grid-cols-2 gap-3">
            <button onclick="updateStatus('${o.id}','diproses')" class="act-btn h-11 flex items-center justify-center bg-brand-red hover:bg-brand-red-hover text-white text-[13px] font-semibold rounded-md">
              <i data-lucide="check" class="w-4 h-4 mr-1.5"></i>
              Konfirmasi & Proses
            </button>
            <button onclick="updateStatus('${o.id}','dibatalkan')" class="act-btn h-11 flex items-center justify-center border border-slate-200 text-slate-600 text-[13px] font-semibold rounded-md hover:bg-slate-50">
              <i data-lucide="x" class="w-4 h-4 mr-1.5"></i>
              Tolak / Batalkan
            </button>
          </div>
        `;
      } else if (isProcessed) {
        actionsHtml = `
          <div class="space-y-3">
            <div>
              <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Update Status</label>
              <div class="grid grid-cols-2 gap-3">
                <button onclick="updateStatus('${o.id}','dikirim')" class="act-btn h-10 flex items-center justify-center bg-green-500 hover:bg-green-600 text-white text-[12px] font-semibold rounded-md">
                  <i data-lucide="truck" class="w-3.5 h-3.5 mr-1.5"></i>
                  Tandai Dikirim
                </button>
                <button onclick="updateStatus('${o.id}','dibatalkan')" class="act-btn h-10 flex items-center justify-center border border-slate-200 text-slate-600 text-[12px] font-semibold rounded-md hover:bg-slate-50">
                  <i data-lucide="x" class="w-3.5 h-3.5 mr-1.5"></i>
                  Batalkan
                </button>
              </div>
            </div>
          </div>
        `;
      } else if (isShipped) {
        actionsHtml = `
          <div class="space-y-3">
            ${o.resi ? `
              <div class="bg-green-50 border border-green-200 rounded-md px-3.5 py-2.5 flex items-center justify-between">
                <div>
                  <p class="text-[10px] text-green-600 font-semibold uppercase tracking-wider">Nomor Resi</p>
                  <p class="text-[13px] font-mono font-bold text-green-800 mt-0.5">${o.resi}</p>
                </div>
                <button onclick="copyText('${o.resi}')" class="w-7 h-7 flex items-center justify-center rounded-md bg-white border border-green-200 text-green-600 hover:bg-green-100">
                  <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                </button>
              </div>
            ` : `
              <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Nomor Resi</label>
                <div class="flex gap-2">
                  <input id="resi-input" type="text" placeholder="Contoh: JNE-1234567890" class="input-field flex-1 h-10 px-3 border border-slate-200 rounded-md text-[13px] text-brand-dark placeholder-slate-400">
                  <button onclick="saveResi('${o.id}')" class="h-10 px-4 bg-brand-red hover:bg-brand-red-hover text-white text-[12px] font-semibold rounded-md">Simpan</button>
                </div>
              </div>
            `}
            <button onclick="updateStatus('${o.id}','selesai')" class="act-btn w-full h-10 flex items-center justify-center bg-green-500 hover:bg-green-600 text-white text-[12px] font-semibold rounded-md">
              <i data-lucide="check-circle" class="w-3.5 h-3.5 mr-1.5"></i>
              Tandai Selesai
            </button>
          </div>
        `;
      } else {
        actionsHtml = `
          <div class="text-center py-4">
            <p class="text-xs text-slate-400">Tidak ada aksi yang tersedia untuk status ini.</p>
          </div>
        `;
      }

      const body = document.getElementById('detail-body');
      body.innerHTML = `
        <div class="p-5 space-y-5">

          <!-- Order Info -->
          <div class="bg-slate-50 rounded-md p-4 space-y-2.5">
            <div class="flex justify-between text-[13px]">
              <span class="text-slate-400">ID Pesanan</span>
              <span class="font-mono font-semibold text-brand-dark">${o.id}</span>
            </div>
            <div class="flex justify-between text-[13px]">
              <span class="text-slate-400">Tanggal</span>
              <span class="font-medium text-brand-dark">${fmtDate(o.tanggal)} ${fmtTime(o.tanggal)}</span>
            </div>
            <div class="h-px bg-slate-200"></div>
            <div class="flex justify-between text-[13px]">
              <span class="text-slate-400">Customer</span>
              <span class="font-semibold text-brand-dark">${o.customer}</span>
            </div>
            <div class="flex justify-between text-[13px]">
              <span class="text-slate-400">WhatsApp</span>
              <span class="font-medium text-brand-dark">${o.wa}</span>
            </div>
          </div>

          <!-- Address -->
          <div>
            <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Alamat Pengiriman</p>
            <p class="text-[13px] text-slate-600 leading-relaxed bg-slate-50 rounded-md p-3">${o.alamat}</p>
          </div>

          <!-- Items -->
          <div>
            <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Item Pesanan</p>
            <div class="bg-slate-50 rounded-md px-4 py-1">${itemsHtml}</div>
          </div>

          <!-- Total -->
          <div class="flex justify-between items-center pt-2 border-t border-slate-100">
            <span class="text-[14px] font-semibold text-brand-dark">Total Bayar</span>
            <span class="text-[18px] font-bold text-slate-900 tabular-nums">${fmt(o.total)}</span>
          </div>

          <!-- Bukti Transfer -->
          <div>
            <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Bukti Transfer</p>
            <div class="bg-slate-50 rounded-md p-2 cursor-pointer" onclick="openLightbox('${o.bukti}')">
              <img src="${o.bukti}" alt="Bukti Transfer ${o.id}" class="proof-img w-full rounded-md bg-white object-contain max-h-[300px]" loading="lazy">
            </div>
            <p class="text-[10px] text-slate-400 mt-1.5 text-center">Klik gambar untuk memperbesar</p>
          </div>

          <!-- Actions -->
          ${canAct ? `
            <div class="border-t border-slate-100 pt-5">
              <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-3">Aksi Admin</p>
              ${actionsHtml}
            </div>
          ` : actionsHtml}

          <!-- Quick WA -->
          <div class="pt-3 border-t border-slate-100">
            <a href="https://wa.me/62${o.wa.replace(/[^0-9]/g,'')}" target="_blank" class="w-full h-9 flex items-center justify-center gap-2 border border-green-200 text-green-700 text-[12px] font-medium rounded-md hover:bg-green-50 transition-colors">
              <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Hubungi via WhatsApp
            </a>
          </div>

        </div>
      `;

      // Show panel
      const panel = document.getElementById('detail-panel');
      panel.classList.remove('detail-hidden');
      panel.classList.add('detail-visible');

      lucide.createIcons();
    }

    function closeDetail() {
      activeOrderId = null;
      const panel = document.getElementById('detail-panel');
      panel.classList.remove('detail-visible');
      panel.classList.add('detail-hidden');
      renderOrders();
    }

    // ==================== STATUS UPDATE ====================
    function updateStatus(id, newStatus) {
      const o = orders.find(x => x.id === id);
      if (!o) return;
      const oldStatus = o.status;
      o.status = newStatus;

      const labels = { diproses: 'diproses', dikirim: 'dikirim', selesai: 'selesai', dibatalkan: 'dibatalkan' };
      showToast(`Pesanan ${id} status diubah ke "${labels[newStatus] || newStatus}"`, 'success');

      renderOrders();
      openDetail(id);
    }

    // ==================== SAVE RESI ====================
    function saveResi(id) {
      const input = document.getElementById('resi-input');
      if (!input || !input.value.trim()) {
        showToast('Nomor resi tidak boleh kosong', 'error');
        return;
      }
      const o = orders.find(x => x.id === id);
      if (!o) return;
      o.resi = input.value.trim();
      showToast(`Nomor resi berhasil disimpan`, 'success');
      openDetail(id);
    }

    // ==================== LIGHTBOX ====================
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.remove('hidden');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.add('hidden');
    }

    // ==================== COPY ====================
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Nomor resi disalin: ' + text, 'success');
      }).catch(() => {
        showToast('Nomor resi: ' + text, 'info');
      });
    }

    // ==================== SIDEBAR ====================
    function openSidebar() {
      const overlay = document.getElementById('sidebar-overlay');
      const sidebar = document.getElementById('sidebar');
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => { overlay.style.opacity = '1'; sidebar.style.transform = 'translateX(0)'; });
    }
    function closeSidebar() {
      const overlay = document.getElementById('sidebar-overlay');
      const sidebar = document.getElementById('sidebar');
      overlay.style.opacity = '0';
      sidebar.style.transform = 'translateX(-100%)';
      setTimeout(() => overlay.classList.add('hidden'), 250);
    }

    // ==================== TOAST ====================
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      let bg, icon, bc;
      switch (type) {
        case 'success': bg='bg-green-50 border-green-200'; icon='check-circle'; bc='border-l-4 border-l-green-500'; break;
        case 'error': bg='bg-red-50 border-red-200'; icon='x-circle'; bc='border-l-4 border-l-red-500'; break;
        default: bg='bg-slate-50 border-slate-200'; icon='info'; bc='border-l-4 border-l-slate-400';
      }
      const ic = type==='success'?'text-green-500':type==='error'?'text-red-500':'text-slate-500';
      const tc = type==='success'?'text-green-800':type==='error'?'text-red-800':'text-slate-700';
      toast.className = `toast-enter flex items-start gap-3 px-4 py-3 rounded-md border shadow-sm max-w-sm w-full ${bg} ${bc}`;
      toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 ${ic} shrink-0 mt-0.5"></i><span class="text-sm ${tc} leading-snug">${message}</span>`;
      container.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => { toast.classList.remove('toast-enter'); toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 250); }, 3500);
    }

    // ==================== KEYBOARD ====================
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (!document.getElementById('lightbox').classList.contains('hidden')) closeLightbox();
        else if (activeOrderId) closeDetail();
      }
    });

    // ==================== INIT ====================
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      renderOrders();
    });
  </script>
</body>
</html>
